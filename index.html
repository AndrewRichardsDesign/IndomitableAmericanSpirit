<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --background: 0 0% 100%;
      --foreground: 260 60% 5%;
      --primary: 252 65% 60%;
      --primary-foreground: 0 0% 100%;
      --accent: 195 50% 55%;
      --accent-foreground: 0 0% 100%;
      --secondary: 240 4.8% 95.9%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --card: 0 0% 100%;
      --card-foreground: 260 60% 5%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 252 65% 60%;
      --radius: 0.625rem;
    }

    .dark {
      --background: 260 85% 5%;
      --foreground: 0 0% 100%;
      --card: 260 70% 8%;
      --card-foreground: 0 0% 100%;
      --secondary: 260 50% 15%;
      --muted: 260 50% 15%;
      --muted-foreground: 0 0% 60%;
      --border: 0 0% 100% / .1;
      --input: 0 0% 100% / .1;
      --primary: 252 65% 60%;
      --accent: 195 50% 55%;
      --ring: 252 65% 60%;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      line-height: 1.6;
    }
    ::selection { background: hsl(var(--primary) / .3); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: hsl(var(--background)); }
    ::-webkit-scrollbar-thumb { background: hsl(var(--primary) / .3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: hsl(var(--primary) / .5); }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    /* ── Utilities ── */
    .container { max-width: 80rem; margin: 0 auto; padding: 0 1rem; }
    @media (min-width: 640px) { .container { padding: 0 1.5rem; } }
    @media (min-width: 1024px) { .container { padding: 0 2rem; } }

    .gradient-text {
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-image: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--accent)));
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.9375rem;
      transition: all 0.3s cubic-bezier(.16, 1, .3, 1);
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn-primary {
      color: hsl(var(--primary-foreground));
      background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--accent)));
      box-shadow: 0 0 20px hsl(var(--primary) / .3);
    }
    .btn-primary:hover {
      box-shadow: 0 0 40px hsl(var(--primary) / .5);
      transform: translateY(-2px);
    }
    .btn-outline {
      color: hsl(var(--foreground));
      background: transparent;
      border: 1px solid hsl(var(--border));
    }
    .btn-outline:hover {
      border-color: hsl(var(--primary));
      color: hsl(var(--primary));
      transform: translateY(-2px);
    }
    .section-header {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-header h2 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 1rem;
    }
    @media (min-width: 768px) { .section-header h2 { font-size: 3rem; } }
    .section-header p {
      color: hsl(var(--muted-foreground));
      max-width: 42rem;
      margin: 0 auto;
      font-size: 1.125rem;
    }
    .arrow-icon {
      width: 1rem;
      height: 1rem;
      transition: transform 0.3s ease;
    }
    .btn:hover .arrow-icon, a:hover .arrow-icon { transform: translateX(4px); }

    /* ── Animations ── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes float-slow {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(3deg); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px hsl(var(--primary) / .3); }
      50% { box-shadow: 0 0 40px hsl(var(--primary) / .6); }
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes charReveal {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(.16, 1, .3, 1) both; }
    .animate-fade-in { animation: fadeIn 0.6s ease both; }

    /* ── Navigation ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: hsl(var(--background) / .95);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid hsl(var(--border));
      transition: all 0.3s ease;
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 4rem; }
    .nav-logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; }
    .nav-links { display: none; list-style: none; gap: 2rem; }
    @media (min-width: 768px) { .nav-links { display: flex; } }
    .nav-links a { font-size: 0.875rem; font-weight: 500; color: hsl(var(--muted-foreground)); transition: color 0.2s ease; }
    .nav-links a:hover { color: hsl(var(--primary)); }
    .nav-actions { display: flex; align-items: center; gap: 0.5rem; }
    .theme-toggle {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      background: transparent; border: 1px solid hsl(var(--border));
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: hsl(var(--foreground)); transition: all 0.2s ease;
    }
    .theme-toggle:hover { background: hsl(var(--muted)); border-color: hsl(var(--primary)); }
    .mobile-toggle {
      display: flex; width: 2.5rem; height: 2.5rem; border-radius: var(--radius);
      background: transparent; border: 1px solid hsl(var(--border));
      cursor: pointer; align-items: center; justify-content: center;
      color: hsl(var(--foreground));
    }
    @media (min-width: 768px) { .mobile-toggle { display: none; } }
    .mobile-menu {
      display: none; position: absolute; top: 4rem; left: 0; right: 0;
      background: hsl(var(--background) / .98); backdrop-filter: blur(24px);
      border-bottom: 1px solid hsl(var(--border)); padding: 1rem;
    }
    .mobile-menu.open { display: block; }
    .mobile-menu a {
      display: block; padding: 0.75rem 1rem; font-size: 0.9375rem; font-weight: 500;
      color: hsl(var(--muted-foreground)); border-radius: var(--radius); transition: all 0.2s ease;
    }
    .mobile-menu a:hover { background: hsl(var(--muted)); color: hsl(var(--primary)); }

    /* ── Hero ── */
    .hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; padding: 6rem 0 4rem;
      background: linear-gradient(135deg, hsl(var(--background)), hsl(var(--background)), hsl(var(--primary) / .05));
      background-size: 200% 200%; animation: gradient-shift 15s ease infinite;
    }
    .hero-content { text-align: center; max-width: 64rem; margin: 0 auto; position: relative; z-index: 2; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; border-radius: 9999px;
      border: 1px solid hsl(var(--border)); background: hsl(var(--card));
      font-size: 0.875rem; font-weight: 500; margin-bottom: 2rem;
      animation: fadeInUp 0.8s cubic-bezier(.16, 1, .3, 1) both;
    }
    .hero-badge .dot {
      width: 0.5rem; height: 0.5rem; border-radius: 50%;
      background: #22c55e; animation: pulse-glow 2s ease-in-out infinite;
      box-shadow: 0 0 8px #22c55e80;
    }
    .hero h1 {
      font-size: 2.25rem; font-weight: 700; letter-spacing: -0.025em;
      margin-bottom: 1.5rem; line-height: 1.1;
    }
    .hero h1 .char { display: inline-block; animation: charReveal 0.5s cubic-bezier(.16, 1, .3, 1) both; }
    @media (min-width: 640px) { .hero h1 { font-size: 3rem; } }
    @media (min-width: 768px) { .hero h1 { font-size: 3.75rem; } }
    @media (min-width: 1024px) { .hero h1 { font-size: 4.5rem; } }
    .hero-subtitle {
      font-size: 1.125rem; color: hsl(var(--muted-foreground));
      max-width: 42rem; margin: 0 auto 2.5rem;
      animation: fadeInUp 0.8s 0.3s cubic-bezier(.16, 1, .3, 1) both;
    }
    .hero-ctas {
      display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;
      margin-bottom: 4rem; animation: fadeInUp 0.8s 0.5s cubic-bezier(.16, 1, .3, 1) both;
    }
    .hero-stats {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;
      max-width: 48rem; margin: 0 auto;
      animation: fadeInUp 0.8s 0.7s cubic-bezier(.16, 1, .3, 1) both;
    }
    @media (min-width: 768px) { .hero-stats { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      text-align: center; padding: 1.5rem; border-radius: var(--radius);
      border: 1px solid hsl(var(--border)); background: hsl(var(--card) / .5);
      backdrop-filter: blur(8px); transition: all 0.3s cubic-bezier(.16, 1, .3, 1);
    }
    .stat-card:hover {
      border-color: hsl(var(--primary) / .3); transform: translateY(-4px);
      box-shadow: 0 8px 30px hsl(var(--primary) / .1);
    }
    .stat-value {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--accent)));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .stat-label { font-size: 0.875rem; color: hsl(var(--muted-foreground)); margin-top: 0.25rem; }
    .scroll-indicator {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      color: hsl(var(--muted-foreground)); font-size: 0.75rem;
      animation: float 3s ease-in-out infinite;
    }
    .scroll-indicator .mouse {
      width: 1.5rem; height: 2.5rem; border-radius: 9999px;
      border: 2px solid hsl(var(--muted-foreground) / .5); position: relative;
    }
    .scroll-indicator .mouse::after {
      content: ''; width: 3px; height: 8px; border-radius: 9999px;
      background: hsl(var(--primary)); position: absolute; top: 6px; left: 50%;
      transform: translateX(-50%); animation: float 1.5s ease-in-out infinite;
    }
    .hero-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .hero-bg .shape { position: absolute; border-radius: 50%; opacity: 0.15; }
    .hero-bg .shape-1 {
      width: 20rem; height: 20rem; top: 10%; left: -5%;
      border: 2px solid hsl(var(--primary) / .2); animation: float 6s ease-in-out infinite;
    }
    .hero-bg .shape-2 {
      width: 15rem; height: 15rem; top: 20%; right: -3%;
      border: 2px solid hsl(var(--accent) / .2); border-radius: var(--radius);
      transform: rotate(45deg); animation: float-slow 8s ease-in-out infinite;
    }
    .hero-bg .shape-3 {
      width: 4rem; height: 4rem; bottom: 30%; left: 10%;
      background: hsl(var(--primary) / .2); animation: float 5s ease-in-out infinite 1s;
    }
    .hero-bg .shape-4 {
      width: 6rem; height: 6rem; bottom: 20%; right: 15%;
      background: hsl(var(--accent) / .15); animation: float-slow 7s ease-in-out infinite 0.5s;
    }

    /* ── About ── */
    .about { padding: 6rem 0 4rem; }
    @media (min-width: 768px) { .about { padding: 8rem 0; } }
    .about-grid { display: grid; grid-template-columns: 1fr; gap: 3rem; align-items: start; }
    @media (min-width: 1024px) { .about-grid { grid-template-columns: 1fr 1fr; gap: 5rem; } }
    .about-label {
      font-size: 0.875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: hsl(var(--primary)); margin-bottom: 0.75rem;
    }
    .about-bio p { color: hsl(var(--muted-foreground)); font-size: 1.0625rem; margin-bottom: 1.5rem; line-height: 1.8; }
    .about-quote {
      padding: 1.5rem; border-left: 3px solid hsl(var(--primary));
      background: hsl(var(--primary) / .05); border-radius: 0 var(--radius) var(--radius) 0; margin: 2rem 0;
    }
    .about-quote p { font-style: italic; color: hsl(var(--foreground)); }
    .about-quote cite {
      display: block; margin-top: 0.5rem; font-size: 0.875rem;
      color: hsl(var(--muted-foreground)); font-style: normal;
    }
    .about-image-wrapper { position: relative; }
    .about-image-placeholder {
      width: 100%; aspect-ratio: 3 / 4; border-radius: calc(var(--radius) + 4px);
      border: 1px solid hsl(var(--border));
      background: linear-gradient(135deg, hsl(var(--primary) / .15), hsl(var(--accent) / .15));
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: hsl(var(--primary) / .4);
    }
    .about-card-overlay {
      position: absolute; bottom: 1.5rem; left: -1rem;
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: var(--radius); padding: 1rem 1.25rem;
      backdrop-filter: blur(8px); box-shadow: 0 10px 40px hsl(var(--foreground) / .1);
    }
    .about-card-overlay .label { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }
    .about-card-overlay .value { font-weight: 600; font-size: 0.9375rem; }
    .about-recognition {
      position: absolute; top: 1.5rem; right: -1rem;
      background: hsl(var(--card)); border: 1px solid hsl(var(--border));
      border-radius: var(--radius); padding: 1rem 1.25rem;
      backdrop-filter: blur(8px); box-shadow: 0 10px 40px hsl(var(--foreground) / .1);
      text-align: center;
    }
    .about-recognition .award-badge {
      width: 2rem; height: 2rem; border-radius: 50%;
      background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--accent)));
      margin: 0 auto 0.5rem; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.75rem;
    }
    .about-recognition .label { font-size: 0.75rem; color: hsl(var(--muted-foreground)); }
    .about-recognition .value { font-weight: 600; font-size: 0.875rem; }

    /* ── Skills ── */
    .skills-section { margin-top: 3rem; }
    .skills-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; }
    .skill-tag {
      padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500;
      border-radius: 9999px; background: hsl(var(--primary) / .1);
      color: hsl(var(--primary)); transition: all 0.2s ease;
    }
    .skill-tag:hover { background: hsl(var(--primary) / .2); transform: translateY(-2px); }

    /* ── Experience Timeline ── */
    .experience-section { margin-top: 3rem; }
    .timeline { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .timeline-item {
      position: relative; padding-left: 2rem;
      border-left: 2px solid hsl(var(--border)); padding-bottom: 0.5rem;
    }
    .timeline-item::before {
      content: ''; position: absolute; left: -6px; top: 6px;
      width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--accent)));
    }
    .timeline-period { font-size: 0.75rem; font-weight: 600; color: hsl(var(--primary)); letter-spacing: 0.05em; }
    .timeline-role { font-weight: 600; margin: 0.25rem 0; }
    .timeline-company { font-size: 0.875rem; color: hsl(var(--muted-foreground)); margin-bottom: 0.25rem; }
    .timeline-desc { font-size: 0.875rem; color: hsl(var(--muted-foreground)); line-height: 1.6; }

    /* ── Projects ── */
    .projects { padding: 6rem 0 4rem; }
    @media (min-width: 768px) { .projects { padding: 8rem 0; } }
    .projects-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 768px) { .projects-grid { grid-template-columns: repeat(2, 1fr); } }
    .project-card {
      border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) + 4px);
      overflow: hidden; background: hsl(var(--card));
      transition: all 0.3s cubic-bezier(.16, 1, .3, 1); cursor: pointer;
    }
    .project-card:hover {
      border-color: hsl(var(--primary) / .3);
      box-shadow: 0 20px 60px hsl(var(--primary) / .1); transform: translateY(-4px);
    }
    .project-image { aspect-ratio: 4 / 3; overflow: hidden; position: relative; }
    .project-image-bg {
      width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(.16, 1, .3, 1);
      display: flex; align-items: center; justify-content: center; font-size: 3rem;
    }
    .project-card:hover .project-image-bg { transform: scale(1.05); }
    .project-image-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, hsl(var(--background) / .6), transparent);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .project-card:hover .project-image-overlay { opacity: 1; }
    .project-info { padding: 1.5rem; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .project-tag {
      font-size: 0.75rem; font-weight: 500; padding: 0.25rem 0.75rem;
      border-radius: 9999px; background: hsl(var(--primary) / .1); color: hsl(var(--primary));
    }
    .project-info h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    .project-info p { font-size: 0.9375rem; color: hsl(var(--muted-foreground)); margin-bottom: 1rem; }
    .project-link {
      display: inline-flex; align-items: center; gap: 0.375rem;
      font-size: 0.875rem; font-weight: 600; color: hsl(var(--primary)); transition: gap 0.3s ease;
    }
    .project-link:hover { gap: 0.625rem; }

    /* ── Case Studies ── */
    .case-studies { padding: 6rem 0 4rem; }
    @media (min-width: 768px) { .case-studies { padding: 8rem 0; } }
    .case-studies-list { display: flex; flex-direction: column; gap: 3rem; }
    .case-study-card {
      display: grid; grid-template-columns: 1fr; gap: 2rem;
      border: 1px solid hsl(var(--border)); border-radius: calc(var(--radius) + 4px);
      overflow: hidden; background: hsl(var(--card)); padding: 1.5rem;
      transition: all 0.3s cubic-bezier(.16, 1, .3, 1);
    }
    @media (min-width: 1024px) {
      .case-study-card { grid-template-columns: 1fr 1fr; padding: 2rem; }
      .case-study-card:nth-child(even) { direction: rtl; }
      .case-study-card:nth-child(even) > * { direction: ltr; }
    }
    .case-study-card:hover {
      border-color: hsl(var(--primary) / .3);
      box-shadow: 0 20px 60px hsl(var(--primary) / .1);
    }
    .case-study-image { aspect-ratio: 3 / 2; border-radius: var(--radius); overflow: hidden; }
    .case-study-image-bg {
      width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(.16, 1, .3, 1);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
    }
    .case-study-card:hover .case-study-image-bg { transform: scale(1.05); }
    .case-study-content h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .case-study-content .subtitle { font-size: 0.9375rem; color: hsl(var(--muted-foreground)); margin-bottom: 1.25rem; }
    .case-study-meta { display: flex; gap: 1.5rem; margin-bottom: 1.25rem; font-size: 0.8125rem; }
    .case-study-meta span { color: hsl(var(--muted-foreground)); }
    .case-study-meta strong { color: hsl(var(--foreground)); }
    .case-study-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
    .case-study-stat {
      text-align: center; padding: 0.75rem; border-radius: var(--radius);
      background: hsl(var(--primary) / .05); border: 1px solid hsl(var(--primary) / .1);
    }
    .case-study-stat .val { font-size: 1.125rem; font-weight: 700; color: hsl(var(--primary)); }
    .case-study-stat .lbl { font-size: 0.6875rem; color: hsl(var(--muted-foreground)); margin-top: 0.125rem; }
    .case-study-details { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.25rem; }
    .case-study-detail { font-size: 0.875rem; }
    .case-study-detail .detail-label { font-weight: 600; color: hsl(var(--foreground)); }
    .case-study-detail .detail-value { color: hsl(var(--muted-foreground)); }

    /* ── Contact ── */
    .contact { padding: 6rem 0 4rem; }
    @media (min-width: 768px) { .contact { padding: 8rem 0; } }
    .contact-grid { display: grid; grid-template-columns: 1fr; gap: 3rem; max-width: 56rem; margin: 0 auto; }
    @media (min-width: 768px) { .contact-grid { grid-template-columns: 1fr 1fr; } }
    .contact-form { display: flex; flex-direction: column; gap: 1.25rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius);
      border: 1px solid hsl(var(--input)); background: hsl(var(--background));
      color: hsl(var(--foreground)); font-family: inherit; font-size: 0.9375rem;
      transition: all 0.2s ease; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / .15);
    }
    .form-group textarea { min-height: 8rem; resize: vertical; }
    .form-group select { cursor: pointer; }
    .contact-info { display: flex; flex-direction: column; gap: 1.5rem; }
    .contact-info p { color: hsl(var(--muted-foreground)); line-height: 1.7; }
    .contact-email {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: hsl(var(--primary)); font-weight: 500; transition: all 0.2s ease;
    }
    .contact-email:hover { text-decoration: underline; }
    .contact-ctas { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
    .contact-cta-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.25rem; border-radius: var(--radius);
      border: 1px solid hsl(var(--border)); font-size: 0.875rem; font-weight: 500;
      transition: all 0.3s cubic-bezier(.16, 1, .3, 1);
    }
    .contact-cta-link:hover {
      border-color: hsl(var(--primary)); color: hsl(var(--primary)); transform: translateX(4px);
    }
    .social-links { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .social-link {
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      border: 1px solid hsl(var(--border)); display: flex;
      align-items: center; justify-content: center;
      transition: all 0.3s ease; color: hsl(var(--muted-foreground)); font-size: 0.875rem;
    }
    .social-link:hover {
      border-color: hsl(var(--primary)); color: hsl(var(--primary));
      transform: translateY(-3px); box-shadow: 0 4px 12px hsl(var(--primary) / .2);
    }

    /* ── Footer ── */
    .footer { padding: 2rem 0; border-top: 1px solid hsl(var(--border)); }
    .footer-inner {
      display: flex; flex-direction: column; align-items: center; gap: 1rem; text-align: center;
    }
    @media (min-width: 768px) {
      .footer-inner { flex-direction: row; justify-content: space-between; }
    }
    .footer-text { font-size: 0.875rem; color: hsl(var(--muted-foreground)); }
    .footer-made {
      font-size: 0.875rem; color: hsl(var(--muted-foreground));
      display: flex; align-items: center; gap: 0.25rem;
    }
    .footer-made .heart { color: #ef4444; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-size: 0.875rem; color: hsl(var(--muted-foreground)); transition: color 0.2s ease; }
    .footer-links a:hover { color: hsl(var(--primary)); }

    /* ── Scroll Reveal ── */
    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(.16, 1, .3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── Project color themes ── */
    .bg-fintech { background: linear-gradient(135deg, hsl(252 65% 60% / .15), hsl(195 50% 55% / .15)); }
    .bg-ecommerce { background: linear-gradient(135deg, hsl(340 65% 55% / .15), hsl(25 90% 60% / .15)); }
    .bg-healthcare { background: linear-gradient(135deg, hsl(160 55% 45% / .15), hsl(195 50% 55% / .15)); }

    .bg-fashion { background: linear-gradient(135deg, hsl(160 40% 50% / .12), hsl(120 40% 55% / .12)); }

      d.textContent = s;
      return d.innerHTML;
    }

    function renderSite(c) {
      // Page title
      document.title = c.siteTitle;

      // ── Navigation ──
      document.getElementById('navLogo').textContent = c.navigation.logo;
      document.getElementById('navLinks').innerHTML = c.navigation.links.map(l =>
        `<li><a href="${esc(l.href)}">${esc(l.label)}</a></li>`
      ).join('');
      document.getElementById('mobileMenu').innerHTML = c.navigation.links.map(l =>
        `<a href="${esc(l.href)}">${esc(l.label)}</a>`
      ).join('');

      // ── Hero ──
      document.getElementById('heroBadge').innerHTML = `<span class="dot"></span> ${esc(c.hero.badge)}`;
      document.getElementById('heroTitle').textContent = c.hero.title;
      document.getElementById('heroSubtitle').textContent = c.hero.subtitle;
      document.getElementById('heroCtas').innerHTML = `
        <a href="${esc(c.hero.primaryCta.href)}" class="btn btn-primary">${esc(c.hero.primaryCta.label)} ${ARROW}</a>
        <a href="${esc(c.hero.secondaryCta.href)}" class="btn btn-outline">${esc(c.hero.secondaryCta.label)} ${ARROW}</a>`;
      document.getElementById('heroStats').innerHTML = c.hero.stats.map(s =>
        `<div class="stat-card"><div class="stat-value">${esc(s.value)}</div><div class="stat-label">${esc(s.label)}</div></div>`

      document.getElementById('scrollIndicator').innerHTML = `<div class="mouse"></div>${esc(c.hero.scrollText)}`;

      // Hero title animation
      const heroTitle = document.getElementById('heroTitle');
      const titleText = heroTitle.textContent;
      heroTitle.textContent = '';
      [...titleText].forEach((ch, i) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        span.style.animationDelay = `${0.6 + i * 0.04}s`;
        heroTitle.appendChild(span);
      });

      // ── About ──
      document.getElementById('aboutHeader').innerHTML =
        `<h2>${esc(c.about.headingStart)} <span class="gradient-text">${esc(c.about.headingHighlight)}</span></h2>`;

      const bioHtml = c.about.bio.map(p => `<p>${esc(p)}</p>`).join('');
      const skillsHtml = c.about.skills.map(s => `<span class="skill-tag">${esc(s)}</span>`).join('');
      const expHtml = c.about.experience.map(e => `
        <div class="timeline-item">
          <div class="timeline-period">${esc(e.period)}</div>
          <div class="timeline-role">${esc(e.role)}</div>
          <div class="timeline-company">${esc(e.company)}</div>
          <div class="timeline-desc">${esc(e.description)}</div>
        </div>`).join('');

      document.getElementById('aboutContent').innerHTML = `
        <div class="about-label">${esc(c.about.subheading)}</div>
        <div class="about-bio">${bioHtml}</div>
        <div class="about-quote">
          <p>&ldquo;${esc(c.about.quote.text)}&rdquo;</p>
          <cite>&mdash; ${esc(c.about.quote.author)}</cite>
        </div>
        <div class="skills-section">
          <div class="about-label">Skills &amp; Tools</div>
          <div class="skills-grid">${skillsHtml}</div>
        </div>
        <div class="experience-section">
          <div class="about-label">Work Experience</div>
          <div class="timeline">${expHtml}</div>
        </div>`;

      document.getElementById('aboutImage').innerHTML = `
        <div class="about-image-placeholder">${ICONS.person}</div>
        <div class="about-card-overlay">
          <div class="label">Location</div>
          <div class="value">${esc(c.about.location)}</div>
        </div>
        <div class="about-recognition">
          <div class="award-badge">${ICONS.star}</div>
          <div class="label">${esc(c.about.recognition.label)}</div>
          <div class="value">${esc(c.about.recognition.value)}</div>
        </div>`;

      // ── Projects ──
      document.getElementById('projectsHeader').innerHTML = `
        <h2>${esc(c.projects.headingStart)} <span class="gradient-text">${esc(c.projects.headingHighlight)}</span></h2>
        <p>${esc(c.projects.description)}</p>`;

      document.getElementById('projectsGrid').innerHTML = c.projects.items.map(p => `
        <div class="project-card reveal">
          <div class="project-image">
            <div class="project-image-bg bg-${esc(p.colorTheme)}">${ICONS[p.icon] || ''}</div>
            <div class="project-image-overlay"></div>
          </div>
          <div class="project-info">
            <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${esc(t)}</span>`).join('')}</div>
            <h3>${esc(p.title)}</h3>
            <p>${esc(p.description)}</p>
            <a href="${esc(p.link)}" class="project-link">View Project ${ARROW}</a>
          </div>
        </div>`).join('');

      document.getElementById('projectsViewAll').innerHTML =
        `<a href="#" class="btn btn-outline">${esc(c.projects.viewAllLabel)} ${ARROW}</a>`;

      // ── Case Studies ──
      document.getElementById('caseStudiesHeader').innerHTML = `
        <h2>${esc(c.caseStudies.headingStart)} <span class="gradient-text">${esc(c.caseStudies.headingHighlight)}</span></h2>
        <p>${esc(c.caseStudies.description)}</p>`;

      document.getElementById('caseStudiesList').innerHTML = c.caseStudies.items.map(cs => `
        <div class="case-study-card reveal">
          <div class="case-study-image">
            <div class="case-study-image-bg bg-${esc(cs.colorTheme)}">${ICONS[cs.icon] || ''}</div>
          </div>
          <div class="case-study-content">
            <h3>${esc(cs.title)}</h3>
            <div class="subtitle">${esc(cs.subtitle)}</div>
            <div class="case-study-meta">
              <span><strong>${esc(cs.duration.split(' ')[0])}</strong> ${esc(cs.duration.split(' ').slice(1).join(' '))}</span>
              <span><strong>${esc(cs.team.split(' ')[0])}</strong> ${esc(cs.team.split(' ').slice(1).join(' '))}</span>
            </div>
            <div class="case-study-stats">
              ${cs.stats.map(s => `<div class="case-study-stat"><div class="val">${esc(s.value)}</div><div class="lbl">${esc(s.label)}</div></div>`).join('')}
            </div>
            <div class="case-study-details">
              <div class="case-study-detail"><span class="detail-label">Challenge: </span><span class="detail-value">${esc(cs.challenge)}</span></div>
              <div class="case-study-detail"><span class="detail-label">Solution: </span><span class="detail-value">${esc(cs.solution)}</span></div>
              <div class="case-study-detail"><span class="detail-label">Impact: </span><span class="detail-value">${esc(cs.impact)}</span></div>
            </div>
            <a href="${esc(cs.link)}" class="btn btn-outline" style="width:fit-content">Read Full Case Study ${ARROW}</a>
          </div>
        </div>`).join('');

      // ── Contact ──
      document.getElementById('contactHeader').innerHTML = `
        <h2>${esc(c.contact.headingStart)} <span class="gradient-text">${esc(c.contact.headingHighlight)}</span></h2>
        <p>${esc(c.contact.description)}</p>`;

      const f = c.contact.form;
      const optionsHtml = f.projectTypes.map(pt =>
        `<option value="${esc(pt.value)}">${esc(pt.label)}</option>`
      ).join('');

      const ctasHtml = c.contact.ctas.map(ct =>
        `<a href="${esc(ct.href)}" class="contact-cta-link">${ICONS[ct.icon] || ''} ${esc(ct.label)}</a>`
      ).join('');

      const socialHtml = c.contact.socialLinks.map(sl =>
        `<a href="${esc(sl.href)}" class="social-link" aria-label="${esc(sl.platform)}">${SOCIAL_ICONS[sl.platform] || ''}</a>`
      ).join('');

      document.getElementById('contactGrid').innerHTML = `
        <form class="contact-form reveal" onsubmit="event.preventDefault(); alert('Message sent! (demo)');">
          <div class="form-group">
            <label for="name">${esc(f.nameLabel)}</label>
            <input type="text" id="name" placeholder="${esc(f.namePlaceholder)}" required />
          </div>
          <div class="form-group">
            <label for="email">${esc(f.emailLabel)}</label>
            <input type="email" id="email" placeholder="${esc(f.emailPlaceholder)}" required />
          </div>
          <div class="form-group">
            <label for="projectType">${esc(f.projectTypeLabel)}</label>
            <select id="projectType">
              <option value="" disabled selected>${esc(f.projectTypePlaceholder)}</option>
              ${optionsHtml}
            </select>
          </div>
          <div class="form-group">
            <label for="message">${esc(f.messageLabel)}</label>
            <textarea id="message" placeholder="${esc(f.messagePlaceholder)}"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
            ${esc(f.submitLabel)} ${ARROW}
          </button>
        </form>
        <div class="contact-info reveal">
          <p>${esc(c.contact.emailPrompt)}</p>
          <a href="mailto:${esc(c.contact.emailAddress)}" class="contact-email">
            ${ICONS.email} ${esc(c.contact.emailAddress)}
          </a>
          <div class="contact-ctas">${ctasHtml}</div>
          <div class="social-links">${socialHtml}</div>
        </div>`;

      // ── Footer ──
      const footerLinksHtml = c.footer.links.map(l =>
        `<a href="${esc(l.href)}">${esc(l.label)}</a>`
      ).join('');
      document.getElementById('footerInner').innerHTML = `
        <div class="footer-text">&copy; ${new Date().getFullYear()} ${esc(c.footer.copyright)}</div>
        <div class="footer-made">Made with <span class="heart">&hearts;</span> using ${esc(c.footer.madeWith)}</div>
        <div class="footer-links">${footerLinksHtml}</div>`;

      // ── Post-render: set up scroll reveal for dynamically added elements ──
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    // ─── Theme Toggle ───
    const htmlEl = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    function setTheme(dark) {
      if (dark) {
        htmlEl.classList.add('dark');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        htmlEl.classList.remove('dark');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setTheme(true);
    }
    themeToggle.addEventListener('click', () => setTheme(!htmlEl.classList.contains('dark')));

    // ─── Mobile Menu ───
    const mobileToggleBtn = document.getElementById('mobileToggle');
    const mobileMenuEl = document.getElementById('mobileMenu');
    mobileToggleBtn.addEventListener('click', () => mobileMenuEl.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (e.target.closest('#mobileMenu a')) mobileMenuEl.classList.remove('open');
    });

    // ─── Nav Scroll Shadow ───
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('nav');
      nav.style.boxShadow = window.scrollY > 100 ? '0 4px 30px hsl(var(--foreground) / .05)' : 'none';
    });

    // ─── Load Content (cache-bust to ensure fresh data after edits) ───
    fetch('content.json?v=' + Date.now())
      .then(res => res.json())
      .then(data => renderSite(data))
      .catch(err => {
        console.error('Failed to load content.json:', err);
        document.body.innerHTML = '<div style="padding:4rem;text-align:center;font-family:Inter,sans-serif;color:#888;"><h1>Content could not be loaded</h1><p>Make sure <code>content.json</code> is in the same directory as <code>index.html</code>.</p></div>';
      });
  </script>
</body>
</html>
