<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --background: 0 0% 98%;
      --foreground: 220 20% 15%;
      --primary: 220 60% 45%;
      --primary-foreground: 0 0% 100%;
      --accent: 200 50% 50%;
      --secondary: 220 15% 93%;
      --muted: 220 10% 92%;
      --muted-foreground: 220 10% 46%;
      --card: 0 0% 100%;
      --card-foreground: 220 20% 15%;
      --border: 220 10% 88%;
      --radius: 0.5rem;
      --hero-overlay: linear-gradient(135deg, rgba(100, 60, 140, 0.7) 0%, rgba(180, 100, 140, 0.4) 50%, rgba(240, 180, 120, 0.3) 100%);
    }

    .dark {
      --background: 220 25% 6%;
      --foreground: 0 0% 95%;
      --card: 220 25% 10%;
      --card-foreground: 0 0% 95%;
      --secondary: 220 20% 16%;
      --muted: 220 15% 18%;
      --muted-foreground: 220 10% 55%;
      --border: 220 15% 18%;
      --primary: 220 60% 55%;
      --accent: 200 50% 55%;
      --hero-overlay: linear-gradient(135deg, rgba(60, 30, 90, 0.85) 0%, rgba(120, 50, 90, 0.6) 50%, rgba(180, 100, 60, 0.4) 100%);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── Navigation ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      transition: background 0.3s, box-shadow 0.3s;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 4rem;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.15rem;
      color: hsl(var(--foreground));
      text-decoration: none;
    }

    .nav-logo svg {
      width: 32px;
      height: 32px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: hsl(var(--muted-foreground));
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: hsl(var(--foreground));
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .theme-toggle {
      background: none;
      border: 1px solid hsl(var(--border));
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: hsl(var(--muted-foreground));
      transition: color 0.2s, border-color 0.2s;
    }

    .theme-toggle:hover {
      color: hsl(var(--foreground));
      border-color: hsl(var(--muted-foreground));
    }

    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      color: hsl(var(--foreground));
      cursor: pointer;
      padding: 0.25rem;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 4rem;
      left: 0;
      right: 0;
      background: hsl(var(--card));
      border-bottom: 1px solid hsl(var(--border));
      padding: 1rem 1.5rem;
      z-index: 99;
    }

    .mobile-menu.open {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .mobile-menu a {
      text-decoration: none;
      color: hsl(var(--foreground));
      font-weight: 500;
      padding: 0.5rem 0;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      min-height: 320px;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #7b4fa0 0%, #c87da0 40%, #e8a87c 70%, #87ceeb 100%);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: var(--hero-overlay);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 4rem 0;
      max-width: 600px;
    }

    .hero h1 {
      font-size: 2.25rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .hero p {
      font-size: 1.05rem;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 400;
    }

    /* ── Featured Thoughts ── */
    .featured {
      padding: 2rem 0;
      text-align: center;
      border-bottom: 1px solid hsl(var(--border));
    }

    .featured-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 1rem;
    }

    .featured-list {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .featured-btn {
      background: hsl(var(--secondary));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .featured-btn:hover,
    .featured-btn.active {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border-color: hsl(var(--primary));
    }

    /* ── Main Content Layout ── */
    .thoughts-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      min-height: 70vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid hsl(var(--border));
      padding: 1.5rem 0;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: hsl(var(--foreground));
      padding: 0 1.25rem;
      margin-bottom: 0.75rem;
    }

    .sidebar-list {
      list-style: none;
    }

    .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 0.65rem 1.25rem;
      font-size: 0.9rem;
      font-family: inherit;
      color: hsl(var(--muted-foreground));
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    .sidebar-item:hover {
      color: hsl(var(--foreground));
      background: hsl(var(--muted));
    }

    .sidebar-item.active {
      color: hsl(var(--foreground));
      font-weight: 600;
      border-left-color: hsl(var(--primary));
      background: hsl(var(--muted));
    }

    /* ── Article Content ── */
    .article-pane {
      padding: 2rem 2.5rem;
      max-width: 800px;
    }

    .article-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: hsl(var(--foreground));
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }

    /* Typography for Google Docs HTML content */
    .article-body {
      color: hsl(var(--foreground));
      line-height: 1.8;
      font-size: 1rem;
    }

    .article-body p {
      margin-bottom: 1.25rem;
    }

    .article-body h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 2rem 0 1rem;
      line-height: 1.3;
    }

    .article-body h2 {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 1.75rem 0 0.75rem;
      line-height: 1.3;
    }

    .article-body h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 1.5rem 0 0.75rem;
    }

    .article-body h4, .article-body h5, .article-body h6 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 1.25rem 0 0.5rem;
    }

    .article-body ul, .article-body ol {
      margin: 0.75rem 0 1.25rem 1.5rem;
    }

    .article-body li {
      margin-bottom: 0.4rem;
    }

    .article-body blockquote {
      border-left: 4px solid hsl(var(--primary));
      padding: 0.75rem 1.25rem;
      margin: 1.25rem 0;
      background: hsl(var(--muted));
      border-radius: 0 var(--radius) var(--radius) 0;
      font-style: italic;
      color: hsl(var(--muted-foreground));
    }

    .article-body a {
      color: hsl(var(--primary));
      text-decoration: underline;
    }

    .article-body a:hover {
      opacity: 0.8;
    }

    .article-body img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
      margin: 1rem 0;
    }

    .article-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.25rem 0;
    }

    .article-body th, .article-body td {
      border: 1px solid hsl(var(--border));
      padding: 0.6rem 0.75rem;
      text-align: left;
    }

    .article-body th {
      background: hsl(var(--muted));
      font-weight: 600;
    }

    .article-body pre, .article-body code {
      font-family: 'Courier New', monospace;
      background: hsl(var(--muted));
      border-radius: 4px;
    }

    .article-body code {
      padding: 0.15em 0.4em;
      font-size: 0.9em;
    }

    .article-body pre {
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .article-body pre code {
      padding: 0;
      background: none;
    }

    /* ── Loading & Error States ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      color: hsl(var(--muted-foreground));
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid hsl(var(--border));
      border-top-color: hsl(var(--primary));
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      padding: 2rem;
      text-align: center;
      color: hsl(var(--muted-foreground));
    }

    .error-msg button {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }

    /* ── Footer ── */
    .footer {
      border-top: 1px solid hsl(var(--border));
      padding: 1.5rem 0;
      margin-top: 2rem;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: hsl(var(--muted-foreground));
    }

    .footer-links {
      display: flex;
      gap: 1.25rem;
    }

    .footer-links a {
      color: hsl(var(--muted-foreground));
      text-decoration: none;
    }

    .footer-links a:hover {
      color: hsl(var(--foreground));
    }

    /* ── Setup Banner ── */
    .setup-banner {
      background: hsl(var(--muted));
      border: 1px dashed hsl(var(--border));
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      color: hsl(var(--muted-foreground));
      line-height: 1.7;
    }

    .setup-banner h3 {
      color: hsl(var(--foreground));
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    .setup-banner code {
      background: hsl(var(--card));
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.85em;
    }

    .setup-banner ol {
      margin: 0.5rem 0 0 1.25rem;
    }

    .setup-banner li {
      margin-bottom: 0.3rem;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .mobile-toggle {
        display: block;
      }

      .hero h1 {
        font-size: 1.6rem;
      }

      .hero-content {
        padding: 2.5rem 0;
      }

      .thoughts-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid hsl(var(--border));
        padding: 1rem 0;
      }

      .sidebar-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
        padding: 0 1rem;
      }

      .sidebar-item {
        padding: 0.45rem 0.85rem;
        border-left: none;
        border-radius: var(--radius);
        font-size: 0.85rem;
      }

      .sidebar-item.active {
        border-left-color: transparent;
        background: hsl(var(--primary));
        color: hsl(var(--primary-foreground));
      }

      .article-pane {
        padding: 1.5rem 1rem;
      }

      .article-title {
        font-size: 1.3rem;
      }

      .featured-list {
        gap: 0.5rem;
      }

      .footer-inner {
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="container nav-inner">
      <a href="#" class="nav-logo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 8 C20 8, 8 16, 8 28 C8 36, 14 42, 20 44 L16 56 L32 48 L48 56 L44 44 C50 42, 56 36, 56 28 C56 16, 44 8, 32 8Z" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="2"/>
          <path d="M24 24 L32 16 L40 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M32 16 L32 38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 32 L32 38 L42 32" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span id="navLogo">Indomitable American Spirit</span>
      </a>
      <ul class="nav-links" id="navLinks"></ul>
      <div class="nav-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="mobile-toggle" id="mobileToggle" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu"></div>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="container hero-content">
      <h1 id="heroTitle">Thoughts from an American patriot</h1>
      <p id="heroSubtitle">Inspired by deep life lessons</p>
    </div>
  </section>

  <!-- Featured Thoughts -->
  <section class="featured" id="featured">
    <div class="container">
      <div class="featured-label">Featured Thoughts</div>
      <div class="featured-list" id="featuredList"></div>
    </div>
  </section>

  <!-- Main Content: Sidebar + Article -->
  <section id="thoughts">
    <div class="container">
      <div class="thoughts-layout">
        <aside class="sidebar">
          <div class="sidebar-title">All Thoughts</div>
          <ul class="sidebar-list" id="sidebarList"></ul>
        </aside>
        <main class="article-pane" id="articlePane">
          <div class="loading" id="articleLoading">
            <div class="loading-spinner"></div>
            <span>Loading articles...</span>
          </div>
        </main>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner" id="footerInner"></div>
  </footer>

  <script>
    // ─── Helpers ───
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ─── State ───
    let siteData = null;
    let articles = [];
    let activeIndex = 0;

    // ─── Render Navigation & Chrome ───
    function renderChrome(c) {
      document.title = c.siteTitle;
      document.getElementById('navLogo').textContent = c.navigation.logo;
      document.getElementById('navLinks').innerHTML = c.navigation.links.map(l =>
        `<li><a href="${esc(l.href)}">${esc(l.label)}</a></li>`
      ).join('');
      document.getElementById('mobileMenu').innerHTML = c.navigation.links.map(l =>
        `<a href="${esc(l.href)}">${esc(l.label)}</a>`
      ).join('');

      // Hero
      document.getElementById('heroTitle').textContent = c.thoughts.heroTitle;
      document.getElementById('heroSubtitle').textContent = c.thoughts.heroSubtitle;

      // Footer
      const footerLinksHtml = c.footer.links.map(l =>
        `<a href="${esc(l.href)}">${esc(l.label)}</a>`
      ).join('');
      document.getElementById('footerInner').innerHTML = `
        <div>&copy; ${new Date().getFullYear()} ${esc(c.footer.copyright)}</div>
        <div class="footer-links">${footerLinksHtml}</div>`;
    }

    // ─── Clean Google Docs HTML ───
    function cleanDocHtml(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Remove Google's style blocks
      doc.querySelectorAll('style').forEach(el => el.remove());

      // Remove class attributes (Google's internal CSS classes)
      doc.querySelectorAll('[class]').forEach(el => el.removeAttribute('class'));

      // Remove id attributes
      doc.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));

      // Clean up style attributes — keep only text formatting
      doc.querySelectorAll('[style]').forEach(el => {
        const style = el.style;
        const keep = {};
        if (style.fontWeight && parseInt(style.fontWeight) >= 700) keep.fontWeight = 'bold';
        if (style.fontStyle === 'italic') keep.fontStyle = 'italic';
        if (style.textDecoration && style.textDecoration.includes('underline')) keep.textDecoration = 'underline';
        if (style.textAlign && style.textAlign !== 'start') keep.textAlign = style.textAlign;

        el.removeAttribute('style');
        Object.entries(keep).forEach(([k, v]) => el.style[k] = v);
      });

      // Convert styled spans to semantic elements
      doc.querySelectorAll('span').forEach(span => {
        if (span.style.fontWeight === 'bold' && !span.querySelector('strong')) {
          const strong = document.createElement('strong');
          strong.innerHTML = span.innerHTML;
          span.replaceWith(strong);
        } else if (span.style.fontStyle === 'italic' && !span.querySelector('em')) {
          const em = document.createElement('em');
          em.innerHTML = span.innerHTML;
          span.replaceWith(em);
        } else if (!span.getAttribute('style') && span.childNodes.length) {
          // Unwrap unstyled spans
          span.replaceWith(...span.childNodes);
        }
      });

      // Remove empty paragraphs but keep as spacers if intentional
      doc.querySelectorAll('p').forEach(p => {
        if (!p.textContent.trim() && !p.querySelector('img')) {
          p.innerHTML = '&nbsp;';
        }
      });

      return doc.body ? doc.body.innerHTML : html;
    }

    // ─── Render Sidebar ───
    function renderSidebar() {
      const list = document.getElementById('sidebarList');
      list.innerHTML = articles.map((a, i) =>
        `<li><button class="sidebar-item${i === activeIndex ? ' active' : ''}" data-index="${i}">${esc(a.title)}</button></li>`
      ).join('');

      list.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.addEventListener('click', () => {
          selectArticle(parseInt(btn.dataset.index));
        });
      });
    }

    // ─── Render Featured ───
    function renderFeatured() {
      const count = siteData.thoughts.featuredCount || 4;
      const featured = articles.slice(0, count);
      const container = document.getElementById('featuredList');
      container.innerHTML = featured.map((a, i) =>
        `<button class="featured-btn${i === activeIndex ? ' active' : ''}" data-index="${i}">${esc(a.title)}</button>`
      ).join('');

      container.querySelectorAll('.featured-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectArticle(parseInt(btn.dataset.index));
        });
      });
    }

    // ─── Select Article ───
    function selectArticle(index) {
      if (index < 0 || index >= articles.length) return;
      activeIndex = index;
      const article = articles[index];

      // Update active states
      document.querySelectorAll('.sidebar-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.featured-btn').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      // Render article content
      const pane = document.getElementById('articlePane');
      pane.innerHTML = `
        <h2 class="article-title">${esc(article.title)}</h2>
        <div class="article-body">${article.html}</div>`;

      // Scroll to content on mobile
      if (window.innerWidth <= 768) {
        pane.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ─── Fetch Articles from Google Apps Script ───
    function fetchArticles(proxyUrl, docId) {
      const cacheKey = 'thoughts-cache-' + docId;
      const cacheTTL = 60 * 60 * 1000; // 1 hour

      // Try cache first
      try {
        const cached = JSON.parse(localStorage.getItem(cacheKey));
        if (cached && Date.now() - cached.ts < cacheTTL) {
          articles = cached.data;
          onArticlesLoaded();
          // Refresh in background
          fetchFromProxy(proxyUrl, docId, cacheKey, true);
          return;
        }
      } catch (e) { /* ignore bad cache */ }

      fetchFromProxy(proxyUrl, docId, cacheKey, false);
    }

    function fetchFromProxy(proxyUrl, docId, cacheKey, silent) {
      const url = proxyUrl + '?docId=' + encodeURIComponent(docId);
      fetch(url)
        .then(res => {
          if (!res.ok) throw new Error('Proxy returned ' + res.status);
          return res.json();
        })
        .then(data => {
          if (!data.articles || !data.articles.length) {
            throw new Error('No articles returned');
          }
          articles = data.articles.map(a => ({
            title: a.title,
            html: cleanDocHtml(a.html)
          }));

          // Cache
          try {
            localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data: articles }));
          } catch (e) { /* storage full */ }

          if (!silent) onArticlesLoaded();
        })
        .catch(err => {
          console.error('Failed to fetch articles:', err);
          if (!silent && !articles.length) {
            showSetupInstructions();
          }
        });
    }

    // ─── On Articles Loaded ───
    function onArticlesLoaded() {
      renderSidebar();
      renderFeatured();
      selectArticle(0);
    }

    // ─── Setup Instructions (shown when proxy isn't configured yet) ───
    function showSetupInstructions() {
      document.getElementById('articlePane').innerHTML = `
        <div class="setup-banner">
          <h3>Google Docs Integration Setup</h3>
          <p>To connect your Google Doc, follow these steps:</p>
          <ol>
            <li>Create a Google Doc with multiple <strong>tabs</strong> (each tab = one article).</li>
            <li>Publish the doc: <strong>File &rarr; Share &rarr; Publish to web</strong>.</li>
            <li>Go to <a href="https://script.google.com" target="_blank" rel="noopener">script.google.com</a> and create a new project.</li>
            <li>Paste the Apps Script code below, enable the <strong>Google Docs API</strong> advanced service, and deploy as a web app (Execute as: Me, Access: Anyone).</li>
            <li>Copy the deployment URL and your Google Doc ID into <code>content.json</code>.</li>
          </ol>

          <h3 style="margin-top:1.5rem;">Apps Script Code</h3>
          <pre style="background:hsl(var(--card));padding:1rem;border-radius:var(--radius);overflow-x:auto;font-size:0.8rem;line-height:1.5;"><code>function doGet(e) {
  var docId = e.parameter.docId;
  if (!docId) {
    return ContentService.createTextOutput(
      JSON.stringify({ error: 'Missing docId parameter' })
    ).setMimeType(ContentService.MimeType.JSON);
  }

  try {
    var doc = Docs.Documents.get(docId, { includeTabsContent: true });
    var tabs = doc.tabs || [];
    var articles = [];

    for (var i = 0; i &lt; tabs.length; i++) {
      var tab = tabs[i];
      var title = tab.tabProperties.title;
      var tabId = tab.tabProperties.tabId;

      // Fetch the published HTML for this tab
      var pubUrl = 'https://docs.google.com/document/d/' + docId +
                   '/pub?tab=' + tabId;
      var response = UrlFetchApp.fetch(pubUrl, { muteHttpExceptions: true });
      var html = response.getContentText();

      // Extract body content
      var bodyMatch = html.match(/&lt;body[^>]*>([\\\s\\\S]*?)&lt;\/body>/i);
      var bodyHtml = bodyMatch ? bodyMatch[1] : html;

      articles.push({ title: title, html: bodyHtml });
    }

    var output = JSON.stringify({ articles: articles });
    return ContentService.createTextOutput(output)
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(
      JSON.stringify({ error: err.message })
    ).setMimeType(ContentService.MimeType.JSON);
  }
}</code></pre>

          <h3 style="margin-top:1.5rem;">content.json Configuration</h3>
          <p>Update these fields in <code>content.json</code>:</p>
          <pre style="background:hsl(var(--card));padding:1rem;border-radius:var(--radius);overflow-x:auto;font-size:0.8rem;"><code>"thoughts": {
  "proxyUrl": "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec",
  "googleDocId": "YOUR_GOOGLE_DOC_ID"
}</code></pre>
          <p style="margin-top:0.75rem;">Your Google Doc ID is the long string in the document URL:<br>
          <code>docs.google.com/document/d/<strong>THIS_PART</strong>/edit</code></p>
        </div>`;

      // Also render empty sidebar
      document.getElementById('sidebarList').innerHTML =
        '<li style="padding: 0.65rem 1.25rem; color: hsl(var(--muted-foreground)); font-size: 0.85rem; font-style: italic;">No articles loaded yet</li>';
      document.getElementById('featuredList').innerHTML = '';
    }

    // ─── Theme Toggle ───
    const htmlEl = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    function setTheme(dark) {
      if (dark) {
        htmlEl.classList.add('dark');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        htmlEl.classList.remove('dark');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setTheme(true);
    }
    themeToggle.addEventListener('click', () => setTheme(!htmlEl.classList.contains('dark')));

    // ─── Mobile Menu ───
    const mobileToggleBtn = document.getElementById('mobileToggle');
    const mobileMenuEl = document.getElementById('mobileMenu');
    mobileToggleBtn.addEventListener('click', () => mobileMenuEl.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (e.target.closest('#mobileMenu a')) mobileMenuEl.classList.remove('open');
    });

    // ─── Nav Scroll Shadow ───
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('nav');
      nav.style.boxShadow = window.scrollY > 50 ? '0 2px 20px hsl(var(--foreground) / .05)' : 'none';
    });

    // ─── Boot ───
    fetch('content.json?v=' + Date.now())
      .then(res => res.json())
      .then(data => {
        siteData = data;
        renderChrome(data);

        const cfg = data.thoughts;
        if (cfg.proxyUrl && cfg.googleDocId &&
            cfg.proxyUrl !== 'YOUR_APPS_SCRIPT_URL_HERE' &&
            cfg.googleDocId !== 'YOUR_GOOGLE_DOC_ID_HERE') {
          fetchArticles(cfg.proxyUrl, cfg.googleDocId);
        } else {
          showSetupInstructions();
        }
      })
      .catch(err => {
        console.error('Failed to load content.json:', err);
        document.body.innerHTML = '<div style="padding:4rem;text-align:center;font-family:Inter,sans-serif;color:#888;"><h1>Content could not be loaded</h1><p>Make sure <code>content.json</code> is in the same directory as <code>index.html</code>.</p></div>';
      });
  </script>
</body>
</html>
